name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - name: linux-arm64
            target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use-cross: true
          - name: linux-x64-musl
            target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use-cross: true
          - name: linux-arm64-musl
            target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use-cross: true
          - name: linux-ia32
            target: i686-unknown-linux-gnu
            os: ubuntu-latest
            use-cross: true
          - name: linux-arm
            target: armv7-unknown-linux-gnueabihf
            os: ubuntu-latest
            use-cross: true
          - name: darwin-x64
            target: x86_64-apple-darwin
            os: macos-latest
          - name: darwin-arm64
            target: aarch64-apple-darwin
            os: macos-latest
          - name: win32-x64
            target: x86_64-pc-windows-msvc
            os: windows-latest
          - name: win32-ia32
            target: i686-pc-windows-msvc
            os: windows-latest
          - name: win32-arm64
            target: aarch64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Verify version matches tag
        shell: bash
        run: |
          CARGO_VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          TAG_VERSION=${GITHUB_REF_NAME#v}
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch: Cargo.toml=$CARGO_VERSION tag=$TAG_VERSION"
            exit 1
          fi

      - name: Install cross
        if: matrix.use-cross
        uses: taiki-e/install-action@cross

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.use-cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} --bin ccost
          else
            cargo build --release --target ${{ matrix.target }} --bin ccost
          fi

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: tar czf ccost-${{ matrix.name }}.tar.gz -C target/${{ matrix.target }}/release ccost

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: cd target/${{ matrix.target }}/release && 7z a ../../../ccost-${{ matrix.name }}.zip ccost.exe

      - uses: actions/upload-artifact@v5
        with:
          name: ccost-${{ matrix.name }}
          path: ccost-${{ matrix.name }}.*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: cd artifacts && sha256sum * > checksums-sha256.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

  publish-crates:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-npm:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Set version and publish
        working-directory: npm
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          npm version "$VERSION" --no-git-tag-version
          npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
